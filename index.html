<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>STK 통합 결재함</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.28.0/lib/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f3f2f1;min-height:100vh}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#fff;border-radius:8px;padding:40px 48px;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.1);max-width:380px;width:100%}
.login-logo{font-size:2.5rem;margin-bottom:12px}
.login-title{font-size:1.2rem;font-weight:700;color:#323130;margin-bottom:6px}
.login-sub{font-size:.8rem;color:#605e5c;margin-bottom:28px}
.btn-login{background:#0078d4;color:#fff;border:none;border-radius:4px;padding:10px 28px;font-size:.95rem;cursor:pointer;width:100%}
.btn-login:hover{background:#106ebe}
.btn-login:disabled{background:#c8c6c4;cursor:not-allowed}
#login-err{color:#a4262c;font-size:.78rem;margin-top:10px;display:none}
#app{display:none;max-width:1000px;margin:0 auto;padding:24px 16px 48px}
/* Header */
.header{background:#fff;border-radius:8px;padding:18px 24px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.header-left .title{font-size:1.1rem;font-weight:700;color:#323130}
.header-left .sub{font-size:.72rem;color:#605e5c;margin-top:3px}
.user-info{display:flex;align-items:center;gap:12px;font-size:.82rem;color:#605e5c}
#btn-logout{background:#fff;border:1px solid #d2d0ce;border-radius:4px;padding:5px 14px;font-size:.8rem;cursor:pointer}
/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar select{border:1px solid #d2d0ce;border-radius:4px;padding:6px 10px;font-size:.82rem;font-family:inherit;background:#fff}
.filter-bar input{border:1px solid #d2d0ce;border-radius:4px;padding:6px 10px;font-size:.82rem;font-family:inherit;width:200px}
.summary-count{font-size:.78rem;color:#605e5c;margin-left:auto}
/* System sections */
.sys-section{background:#fff;border-radius:8px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden}
.sys-header{padding:12px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #edebe9}
.sys-header-left{display:flex;align-items:center;gap:8px}
.sys-name{font-size:.9rem;font-weight:700;color:#323130}
.sys-count{background:#a4262c;color:#fff;border-radius:10px;padding:1px 8px;font-size:.7rem;font-weight:700}
.sys-link{font-size:.72rem;color:#0078d4;text-decoration:none}
.sys-link:hover{text-decoration:underline}
/* Table */
.appr-table{width:100%;border-collapse:collapse;font-size:.82rem}
.appr-table th{padding:9px 14px;text-align:left;background:#f8f8f8;border-bottom:1px solid #edebe9;font-weight:600;color:#323130;font-size:.75rem}
.appr-table td{padding:9px 14px;border-bottom:1px solid #f3f2f1;color:#323130;vertical-align:middle}
.appr-table tr:last-child td{border-bottom:none}
.appr-table tr:hover td{background:#faf9f8;cursor:pointer}
.empty-row td{text-align:center;padding:20px;color:#a19f9d;font-size:.8rem}
/* Badges */
.sys-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:700}
.sys-IT{background:#e8f4ff;color:#0078d4}.sys-SCC{background:#f0fff4;color:#107c10}
.sys-GW{background:#fff8e1;color:#b45309}.sys-BP{background:#f3e8ff;color:#7b2d8b}
.sys-FA{background:#fce8ff;color:#881798}.sys-MC{background:#e8fff0;color:#006b3e}
.sys-RR{background:#fff0f0;color:#c50f1f}
.badge-대기{background:#fff4ce;color:#7d5700;border-radius:10px;padding:2px 8px;font-size:.68rem;font-weight:600}
.badge-승인완료{background:#dff6dd;color:#107c10;border-radius:10px;padding:2px 8px;font-size:.68rem;font-weight:600}
.badge-반려{background:#fde7e9;color:#a4262c;border-radius:10px;padding:2px 8px;font-size:.68rem;font-weight:600}
/* Buttons */
.btn-approve{background:#107c10;color:#fff;border:none;border-radius:4px;padding:4px 12px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit}
.btn-approve:hover{background:#0e6b0e}
.btn-reject{background:#a4262c;color:#fff;border:none;border-radius:4px;padding:4px 12px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit}
.btn-reject:hover{background:#8f1f24}
/* Detail modal */
#detail-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding-top:50px}
#detail-modal.open{display:flex}
.modal-box{background:#fff;border-radius:8px;width:600px;max-width:95vw;max-height:85vh;overflow-y:auto;padding:24px 28px;position:relative}
.modal-close{position:absolute;top:14px;right:18px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:#605e5c}
.modal-title{font-size:.95rem;font-weight:700;color:#323130;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #edebe9}
.modal-sec{margin:14px 0 8px;font-size:.8rem;font-weight:700;color:#1F4E79;padding:5px 10px;background:#EFF6FF;border-left:3px solid #1F4E79;border-radius:3px}
.modal-row{display:flex;padding:6px 0;border-bottom:1px solid #f3f2f1;font-size:.8rem}
.modal-row:last-child{border-bottom:none}
.modal-label{color:#605e5c;width:150px;flex-shrink:0;font-size:.75rem}
.modal-val{color:#323130;font-weight:500;flex:1}
.appr-item{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 12px;border-bottom:1px solid #edebe9}
.appr-item:last-child{border-bottom:none}
/* Confirm modal */
#confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;align-items:center;justify-content:center}
#confirm-modal.open{display:flex}
.confirm-box{background:#fff;border-radius:10px;padding:28px;max-width:420px;width:92%;box-shadow:0 4px 24px rgba(0,0,0,.2)}
/* Loading */
#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);align-items:center;justify-content:center;z-index:999}
#loading.show{display:flex}
.loading-box{background:#fff;border-radius:6px;padding:24px 36px;font-size:.9rem;color:#323130;display:flex;flex-direction:column;align-items:center;gap:14px}
.spinner{width:30px;height:30px;border:3px solid #edebe9;border-top:3px solid #0078d4;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Empty / Error */
.all-done{text-align:center;padding:60px 20px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.all-done .icon{font-size:2.5rem;margin-bottom:12px}
.all-done .msg{font-size:.95rem;font-weight:600;color:#323130;margin-bottom:6px}
.all-done .sub{font-size:.78rem;color:#a19f9d}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">📬</div>
    <div class="login-title">STK 통합 결재함</div>
    <div class="login-sub">STK 결재 시스템 전체 대기 항목</div>
    <button class="btn-login" id="btn-login" disabled>로딩 중...</button>
    <div id="login-err"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="title">📬 STK 통합 결재함</div>
      <div class="sub">STK Korea 결재 시스템 전체 대기 항목</div>
    </div>
    <div class="user-info">
      <span id="user-name"></span>
      <button id="btn-logout" onclick="signOut()">로그아웃</button>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <select id="filter-sys" onchange="renderAll()">
      <option value="">전체 시스템</option>
      <option value="IT">IT Ticket</option>
      <option value="SCC">STK Contract</option>
      <option value="GW">Goodwill</option>
      <option value="BP">BP Master</option>
      <option value="FA">FA Registration</option>
      <option value="MC">Mobility Car</option>
      <option value="RR">Repair Report</option>
    </select>
    <select id="filter-status" onchange="renderAll()">
      <option value="대기">대기 중</option>
      <option value="">전체</option>
      <option value="승인">승인</option>
      <option value="반려">반려</option>
    </select>
    <span class="summary-count" id="summary-count"></span>
    <button onclick="loadAll()" style="background:#0078d4;color:#fff;border:none;border-radius:4px;padding:6px 16px;font-size:.8rem;cursor:pointer;font-family:inherit">🔄 새로고침</button>
  </div>

  <div id="content"></div>
</div>

<!-- Detail Modal -->
<div id="detail-modal" onclick="if(event.target===this)closeDetail()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeDetail()">×</button>
    <div class="modal-title" id="detail-title">상세보기</div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- Confirm Modal -->
<div id="confirm-modal" onclick="if(event.target===this)closeConfirm()">
  <div class="confirm-box">
    <div id="confirm-title" style="font-size:1rem;font-weight:700;color:#323130;margin-bottom:6px"></div>
    <div id="confirm-sub" style="font-size:.78rem;color:#605e5c;margin-bottom:14px"></div>
    <textarea id="confirm-comment" rows="3" style="width:100%;border:1px solid #d2d0ce;border-radius:4px;padding:8px 10px;font-size:.82rem;font-family:inherit;resize:vertical;margin-bottom:14px"></textarea>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button onclick="closeConfirm()" style="background:#fff;border:1px solid #d2d0ce;border-radius:4px;padding:7px 20px;font-size:.85rem;cursor:pointer;font-family:inherit">취소</button>
      <button id="confirm-ok-btn" style="border:none;border-radius:4px;padding:7px 20px;font-size:.85rem;cursor:pointer;font-weight:600;font-family:inherit"></button>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="loading"><div class="loading-box"><div class="spinner"></div><span>처리 중...</span></div></div>

<script>
const CLIENT_ID = '432976c2-b43a-492e-8213-ece505fa1f51';
const TENANT_ID = '19cab1f5-21f4-44df-8ac6-96d6ca595203';
const SITE_PATH = 'startruckkorea.sharepoint.com:/sites/STK-DB:';
const GRAPH     = 'https://graph.microsoft.com/v1.0';
const SCOPES    = ['User.Read','Sites.ReadWrite.All','Files.ReadWrite.All'];

const SYSTEMS = [
  {key:'IT',  name:'IT Ticket',       apr:'IT_Approvals',          req:'IT_Requests',    url:'https://itsm-ticket.startruckkorea.com/'},
  {key:'SCC', name:'STK Contract',    apr:'STK_ContractApprovals', req:'STK_Contracts',  url:'https://scc.startruckkorea.com/'},
  {key:'GW',  name:'Goodwill',        apr:'GW_Approvals',          req:'GW_Requests',    url:'https://gw.startruckkorea.com/'},
  {key:'BP',  name:'BP Master Data',  apr:'BP_Approvals',          req:'BP_Requests',    url:'https://bp-master.startruckkorea.com/'},
  {key:'FA',  name:'FA Registration', apr:'FA_Approvals',          req:'FA_Requests',    url:'https://fa.startruckkorea.com/'},
  {key:'MC',  name:'Mobility Car',    apr:'MC_Approvals',          req:'MC_Requests',    url:'https://mc.startruckkorea.com/'},
  {key:'RR',  name:'Repair Report',   apr:'RR_Approvals',          req:'RR_Requests',    url:'https://mc.startruckkorea.com/'},
];

let msalApp=null, user=null, siteId=null;
let _allData = {}; // key -> {apprItems, reqMap}
let _pending = null;

// ── MSAL ──
window.addEventListener('load', async () => {
  const btn = document.getElementById('btn-login');
  try {
    const inst = await msal.PublicClientApplication.createPublicClientApplication({
      auth:{ clientId:CLIENT_ID, authority:'https://login.microsoftonline.com/'+TENANT_ID, redirectUri:window.location.origin+window.location.pathname },
      cache:{ cacheLocation:'localStorage' }
    });
    msalApp = inst;
    const resp = await msalApp.handleRedirectPromise();
    if(resp){ msalApp.setActiveAccount(resp.account); await boot(resp.account); return; }
    const accounts = msalApp.getAllAccounts();
    if(accounts.length){ msalApp.setActiveAccount(accounts[0]); await boot(accounts[0]); return; }
    btn.disabled=false; btn.textContent='Microsoft 계정으로 로그인';
  } catch(e){
    btn.disabled=false; btn.textContent='Microsoft 계정으로 로그인';
    document.getElementById('login-err').textContent='초기화 오류: '+e.message;
    document.getElementById('login-err').style.display='block';
  }
});
async function signIn(){
  try{
    if(window!==window.top){window.open(window.location.href,'_blank');return;}
    const r=await msalApp.loginPopup({scopes:SCOPES});
    msalApp.setActiveAccount(r.account); await boot(r.account);
  }catch(e){ document.getElementById('login-err').textContent=e.message; document.getElementById('login-err').style.display='block'; }
}
document.getElementById('btn-login').onclick = signIn;
function signOut(){ msalApp.logoutRedirect(); }

async function token(){
  try{ return (await msalApp.acquireTokenSilent({scopes:SCOPES,account:msalApp.getActiveAccount()})).accessToken; }
  catch(e){
    if(e.name==='InteractionRequiredAuthError'||(e.errorCode&&e.errorCode.includes('interaction_required'))){
      const r=await msalApp.acquireTokenPopup({scopes:SCOPES}); msalApp.setActiveAccount(r.account); return r.accessToken;
    }
    throw e;
  }
}
async function api(path,method='GET',body=null){
  const t=await token();
  const opts={method,headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(GRAPH+path,opts);
  if(!res.ok)throw new Error((await res.json())?.error?.message||res.status);
  return res.status===204?null:res.json();
}
function loading(on){ document.getElementById('loading').className=on?'show':''; }
function fmtDate(s){ if(!s)return'-'; const d=new Date(s); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

// ── Boot ──
async function boot(account){
  user = account;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  try{
    const me = await api('/me?$select=mail,userPrincipalName');
    user.email = (me.mail||me.userPrincipalName||account.username||'').toLowerCase();
  }catch(e){ user.email = (account.username||'').toLowerCase(); }
  document.getElementById('user-name').textContent = account.name||account.username;
  const site = await api('/sites/'+SITE_PATH);
  siteId = site.id;
  await loadAll();
}

// ── Load All Systems ──
async function loadAll(){
  document.getElementById('content').innerHTML = '<div style="text-align:center;padding:48px;color:#605e5c"><div class="spinner" style="margin:0 auto 16px"></div>전체 결재 데이터 불러오는 중...</div>';
  _allData = {};
  await Promise.all(SYSTEMS.map(async sys => {
    try{
      const [apprData, reqData] = await Promise.all([
        api('/sites/'+siteId+'/lists/'+sys.apr+'/items?$expand=fields&$top=500'),
        api('/sites/'+siteId+'/lists/'+sys.req+'/items?$expand=fields&$top=500'),
      ]);
      const reqMap = {};
      reqData.value.forEach(r=>{ reqMap[r.id]=r.fields; });
      _allData[sys.key] = { apprItems: apprData.value, reqMap };
    }catch(e){ _allData[sys.key] = { apprItems:[], reqMap:{}, error:e.message }; }
  }));
  renderAll();
}

// ── Render ──
function renderAll(){
  const filterSys    = document.getElementById('filter-sys').value;
  const filterStatus = document.getElementById('filter-status').value;
  const myEmail      = (user.email||'').toLowerCase();
  let html = '', grandTotal = 0;

  for(const sys of SYSTEMS){
    if(filterSys && filterSys !== sys.key) continue;
    const d = _allData[sys.key];
    if(!d){ html += sysSection(sys, '<div class="empty-row"><td colspan="6">불러오는 중...</td></div>',0); continue; }
    if(d.error){ html += sysSection(sys, `<tr class="empty-row"><td colspan="6" style="color:#a4262c">⚠️ ${d.error}</td></tr>`,0); continue; }

    // 내 결재 항목 필터
    let mine = d.apprItems.filter(i => (i.fields.ApproverEmail||'').toLowerCase()===myEmail);
    if(filterStatus) mine = mine.filter(i=>(i.fields.Status||'').trim()===filterStatus);
    mine = mine.sort((a,b)=>{
      const ra=d.reqMap[String(a.fields.RequestID)], rb=d.reqMap[String(b.fields.RequestID)];
      return new Date(rb?.RequestDate||0)-new Date(ra?.RequestDate||0);
    });

    grandTotal += mine.length;
    if(!mine.length){
      html += sysSection(sys, `<tr class="empty-row"><td colspan="6">${filterStatus==='대기'?'결재 대기 항목이 없습니다':'항목이 없습니다'}</td></tr>`, 0);
      continue;
    }

    let rows = '';
    mine.forEach(item=>{
      const f=item.fields, rf=d.reqMap[String(f.RequestID)]||{};
      const sc={'대기':'badge-대기','승인':'badge-승인완료','반려':'badge-반려','대기(잠김)':'badge-대기','승인완료':'badge-승인완료'};
      let summary='';
      if(sys.key==='GW')       summary=(rf.Source||'')+' / '+(rf.GoodwillType||'');
      else if(sys.key==='BP')  summary=(rf.BPType||'')+' / '+(rf.SubCategory||'');
      else if(sys.key==='FA')  summary=(rf.FAType||'')+' / '+(rf.Title||'').substring(0,25);
      else if(sys.key==='SCC') summary=(rf.ContractCompanyType||'')+' / '+(rf.Title||'').substring(0,25);
      else if(sys.key==='MC')  summary=(rf.Department||'')+' / '+(rf.Period||'').substring(0,22);
      else if(sys.key==='RR')  summary=(rf.VehicleModel||'')+' / '+(rf.AccidentType||'');
      else                      summary=(rf.TicketType||'')+' / '+(rf.Title||'').substring(0,25);

      const isPending = (f.Status||'').trim()==='대기';
      rows += `<tr onclick="showDetail('${sys.key}',${f.RequestID})">
        <td style="color:#0078d4;font-weight:600">${f.RequestID}</td>
        <td style="font-size:.78rem">${rf.RequesterEmail||'-'}</td>
        <td style="font-size:.78rem">${summary||'-'}</td>
        <td><span class="${sc[f.Status||'대기']||'badge-대기'}">${f.Status||'대기'}</span></td>
        <td style="font-size:.75rem">${fmtDate(rf.RequestDate)}</td>
        <td onclick="event.stopPropagation()" style="white-space:nowrap">
          ${isPending?`<button class="btn-approve" onclick="showConfirm(${item.id},'승인',${f.RequestID},'${sys.key}')">승인</button> <button class="btn-reject" onclick="showConfirm(${item.id},'반려',${f.RequestID},'${sys.key}')">반려</button>`:'<span style="font-size:.72rem;color:#a19f9d">처리완료</span>'}
        </td>
      </tr>`;
    });

    html += sysSection(sys,
      `<table class="appr-table"><thead><tr>
        <th>번호</th><th>신청자</th><th>요약</th><th>상태</th><th>신청일</th><th style="text-align:center">처리</th>
      </tr></thead><tbody>${rows}</tbody></table>`,
      mine.length);
  }

  document.getElementById('summary-count').textContent = '총 ' + grandTotal + '건';
  document.getElementById('content').innerHTML = grandTotal===0 && filterStatus==='대기'
    ? `<div class="all-done"><div class="icon">✅</div><div class="msg">모든 결재 완료!</div><div class="sub">현재 대기 중인 결재 항목이 없습니다.</div></div>`
    : html;
}

function sysSection(sys, inner, count){
  return `<div class="sys-section">
    <div class="sys-header">
      <div class="sys-header-left">
        <span class="sys-badge sys-${sys.key}">${sys.key}</span>
        <span class="sys-name">${sys.name}</span>
        ${count>0?`<span class="sys-count">${count}</span>`:''}
      </div>
      <a href="${sys.url}" target="_blank" class="sys-link">바로가기 →</a>
    </div>
    ${inner}
  </div>`;
}

// ── Detail ──
async function showDetail(sysKey, reqId){
  const modal = document.getElementById('detail-modal');
  document.getElementById('detail-content').innerHTML='<div style="text-align:center;padding:32px;color:#605e5c">불러오는 중...</div>';
  modal.className='open';
  const sys = SYSTEMS.find(s=>s.key===sysKey);
  document.getElementById('detail-title').textContent = (sys?.name||sysKey)+' #'+reqId;
  try{
    const [r, apprData] = await Promise.all([
      api('/sites/'+siteId+'/lists/'+sys.req+'/items/'+reqId+'?$expand=fields'),
      api('/sites/'+siteId+'/lists/'+sys.apr+'/items?$expand=fields&$top=500'),
    ]);
    const f = r.fields;
    const apprList = apprData.value.filter(i=>Number(i.fields.RequestID)===Number(reqId)).sort((a,b)=>a.fields.ApprovalOrder-b.fields.ApprovalOrder);
    const sc = {'대기':'#7d5700','승인':'#107c10','반려':'#a4262c','대기(잠김)':'#605e5c','승인완료':'#107c10'};
    const sec = t=>`<div class="modal-sec">${t}</div>`;
    const row = (l,v)=>`<div class="modal-row"><div class="modal-label">${l}</div><div class="modal-val">${v||'-'}</div></div>`;

    // 시스템별 필드 구성
    let fields = sec('기본 정보')+row('신청번호',reqId)+row('신청자',f.RequesterEmail)+
      row('상태',`<span style="font-weight:600;color:${sc[f.Status]||'#323130'}">${f.Status||''}</span>`)+
      row('신청일',fmtDate(f.RequestDate));
    if(sysKey==='GW')       fields+=sec('신청 정보')+row('Source',f.Source)+row('Amount',f.Amount)+row('Type',f.GoodwillType)+row('Title',f.Title)+row('Description',f.Description);
    else if(sysKey==='BP')  fields+=sec('신청 정보')+row('BP Type',f.BPType)+row('Sub Category',f.SubCategory)+row('BP Name',f.BPName);
    else if(sysKey==='FA')  fields+=sec('신청 정보')+row('FA Type',f.FAType)+row('Title',f.Title);
    else if(sysKey==='SCC') fields+=sec('신청 정보')+row('Type',f.ContractCompanyType)+row('Title',f.Title)+row('Partner',f.ContractPartner);
    else if(sysKey==='IT')  fields+=sec('신청 정보')+row('Type',f.TicketType)+row('Title',f.Title)+row('Description',f.Description);
    else if(sysKey==='MC')  fields+=sec('신청 정보')+row('Company',f.Company)+row('Department',f.Department)+row('Car Model',f.CarModel)+row('Period',f.Period);
    else if(sysKey==='RR')  fields+=sec('신청 정보')+row('Vehicle Model',f.VehicleModel)+row('Plate Number',f.PlateNumber)+row('Accident Type',f.AccidentType)+row('Date/Time',f.AccidentDateTime)+row('Location',f.Location);

    const apprHtml = sec('결재 이력')+'<div style="background:#f9f9f9;border-radius:6px;border:1px solid #edebe9;overflow:hidden">'+
      apprList.map(a=>{const af=a.fields;return`<div class="appr-item"><div>
        <div style="font-weight:600;font-size:.82rem">${af.ApprovalOrder}차 ${af.ApproverRole||''}</div>
        <div style="font-size:.72rem;color:#605e5c;margin-top:2px">${af.ApproverName||''} · ${af.ApproverEmail||''}</div>
        ${af.ApprovalDate?`<div style="font-size:.7rem;color:#a19f9d;margin-top:2px">${fmtDate(af.ApprovalDate)}</div>`:''}
        ${af.Comment?`<div style="margin-top:4px;font-size:.72rem;background:#fff;border:1px solid #edebe9;border-radius:4px;padding:3px 8px">💬 ${af.Comment}</div>`:''}
      </div><span style="color:${sc[af.Status]||'#323130'};font-weight:700;font-size:.78rem;white-space:nowrap">${af.Status||''}</span></div>`;}).join('')+
      '</div>';

    const myPending = apprList.find(a=>(a.fields.ApproverEmail||'').toLowerCase()===(user.email||'').toLowerCase()&&(a.fields.Status||'').trim()==='대기');
    document.getElementById('detail-content').innerHTML = fields + apprHtml +
      (myPending?`<div style="display:flex;gap:10px;margin-top:16px">
        <button onclick="showConfirm(${myPending.id},'승인',${reqId},'${sysKey}')" class="btn-approve" style="flex:1;border-radius:6px;padding:10px;font-size:.9rem;font-weight:700">✅ 승인</button>
        <button onclick="showConfirm(${myPending.id},'반려',${reqId},'${sysKey}')" class="btn-reject" style="flex:1;border-radius:6px;padding:10px;font-size:.9rem;font-weight:700">❌ 반려</button>
      </div>`:'');
  }catch(e){ document.getElementById('detail-content').innerHTML='<p style="color:#a4262c">오류: '+e.message+'</p>'; }
}
function closeDetail(){ document.getElementById('detail-modal').className=''; }

// ── Confirm & Approve ──
function showConfirm(apprId,action,reqId,sysKey){
  _pending={apprId,action,reqId,sysKey};
  const isReject=action==='반려';
  document.getElementById('confirm-title').textContent=isReject?'❌ 반려 확인':'✅ 승인 확인';
  document.getElementById('confirm-sub').textContent=isReject?'반려 사유를 입력해주세요. (필수)':'이 신청을 승인하시겠습니까?';
  const commentEl=document.getElementById('confirm-comment');
  commentEl.value=''; commentEl.placeholder=isReject?'반려 사유 입력 (필수)':'의견 입력 (선택사항)';
  const okBtn=document.getElementById('confirm-ok-btn');
  okBtn.textContent=isReject?'반려':'승인';
  okBtn.style.background=isReject?'#a4262c':'#107c10';
  okBtn.style.color='#fff'; okBtn.onclick=doApproval;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm(){ document.getElementById('confirm-modal').classList.remove('open'); _pending=null; }

async function doApproval(){
  if(!_pending)return;
  const{apprId,action,reqId,sysKey}=_pending;
  const comment=document.getElementById('confirm-comment').value.trim();
  if(action==='반려'&&!comment){alert('반려 사유를 입력해주세요.');return;}
  closeConfirm();
  const sys=SYSTEMS.find(s=>s.key===sysKey);
  if(!sys){alert('알 수 없는 시스템: '+sysKey);return;}
  loading(true);
  try{
    await api('/sites/'+siteId+'/lists/'+sys.apr+'/items/'+apprId,'PATCH',{
      fields:{Status:action==='승인'?'승인':action, ApprovalDate:new Date().toISOString(), Comment:comment}
    });
    if(action==='반려'){
      await api('/sites/'+siteId+'/lists/'+sys.req+'/items/'+reqId,'PATCH',{fields:{Status:'반려'}});
    }else{
      const all=await api('/sites/'+siteId+'/lists/'+sys.apr+'/items?$expand=fields&$top=500');
      const next=all.value.filter(i=>Number(i.fields.RequestID)===Number(reqId)&&(i.fields.Status||'').trim()==='대기(잠김)').sort((a,b)=>a.fields.ApprovalOrder-b.fields.ApprovalOrder);
      if(next.length)await api('/sites/'+siteId+'/lists/'+sys.apr+'/items/'+next[0].id,'PATCH',{fields:{Status:'대기'}});
      else await api('/sites/'+siteId+'/lists/'+sys.req+'/items/'+reqId,'PATCH',{fields:{Status:'승인완료'}});
    }
    closeDetail();
    await loadAll();
  }catch(e){alert('오류: '+e.message);}
  finally{loading(false);}
}
</script>
