<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>STK 통합 결재함</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.28.0/lib/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f2f5;min-height:100vh;color:#1a1a2e}
/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0078d4 0%,#005a9e 100%)}
.login-card{background:#fff;border-radius:16px;padding:48px 52px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.18);max-width:400px;width:100%}
.login-logo{font-size:3rem;margin-bottom:16px}
.login-title{font-size:1.3rem;font-weight:700;color:#1a1a2e;margin-bottom:6px}
.login-sub{font-size:.82rem;color:#6b7280;margin-bottom:32px}
.btn-login{background:#0078d4;color:#fff;border:none;border-radius:8px;padding:12px 0;font-size:.95rem;font-weight:600;cursor:pointer;width:100%;font-family:inherit;transition:background .15s}
.btn-login:hover{background:#106ebe}
.btn-login:disabled{background:#c8c6c4;cursor:not-allowed}
#login-err{color:#dc2626;font-size:.78rem;margin-top:10px;display:none}
/* App */
#app{display:none;max-width:1040px;margin:0 auto;padding:24px 16px 60px}
/* Header */
.header{background:#fff;border-radius:12px;padding:16px 24px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.header-brand{display:flex;align-items:center;gap:10px}
.header-icon{font-size:1.5rem}
.header-title{font-size:1.05rem;font-weight:700;color:#1a1a2e}
.header-sub{font-size:.72rem;color:#6b7280;margin-top:2px}
.user-row{display:flex;align-items:center;gap:10px}
.user-name{font-size:.82rem;color:#4b5563;font-weight:500}
#btn-logout{background:#fff;border:1.5px solid #e5e7eb;border-radius:6px;padding:5px 14px;font-size:.78rem;cursor:pointer;color:#4b5563;font-family:inherit;transition:all .15s}
#btn-logout:hover{border-color:#0078d4;color:#0078d4}
/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar select{border:1.5px solid #e5e7eb;border-radius:8px;padding:7px 12px;font-size:.82rem;font-family:inherit;background:#fff;color:#374151;cursor:pointer;transition:border .15s}
.filter-bar select:focus{outline:none;border-color:#0078d4}
.summary-badge{background:#0078d4;color:#fff;border-radius:20px;padding:4px 14px;font-size:.78rem;font-weight:600;margin-left:auto}
.btn-refresh{background:#fff;border:1.5px solid #e5e7eb;border-radius:8px;padding:7px 16px;font-size:.82rem;cursor:pointer;font-family:inherit;color:#374151;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-refresh:hover{border-color:#0078d4;color:#0078d4}
/* System card grid */
#content{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:14px}
.sys-card{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.06);overflow:hidden;display:flex;flex-direction:column}
.sys-card-header{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1.5px solid #f3f4f6}
.sys-card-left{display:flex;align-items:center;gap:9px}
.sys-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:.3px}
.sys-IT{background:#dbeafe;color:#1d4ed8}.sys-SCC{background:#dcfce7;color:#15803d}
.sys-GW{background:#fef3c7;color:#b45309}.sys-BP{background:#f3e8ff;color:#7c3aed}
.sys-FA{background:#fce7f3;color:#be185d}.sys-MC{background:#d1fae5;color:#065f46}
.sys-RR{background:#fee2e2;color:#b91c1c}
.sys-name{font-size:.9rem;font-weight:700;color:#1a1a2e}
.sys-cnt{background:#ef4444;color:#fff;border-radius:20px;padding:2px 9px;font-size:.68rem;font-weight:700}
.sys-link{font-size:.72rem;color:#0078d4;text-decoration:none;padding:4px 10px;border:1px solid #bfdbfe;border-radius:6px;transition:all .15s}
.sys-link:hover{background:#dbeafe}
/* Empty */
.sys-empty{padding:18px 20px;color:#9ca3af;font-size:.82rem}
/* Table */
.appr-table{width:100%;border-collapse:collapse}
.appr-table th{padding:7px 12px;text-align:left;background:#f9fafb;border-bottom:1.5px solid #f3f4f6;font-size:.68rem;font-weight:700;color:#6b7280;letter-spacing:.3px;text-transform:uppercase}
.appr-table td{padding:8px 12px;border-bottom:1px solid #f3f4f6;font-size:.78rem;color:#374151;vertical-align:middle}
.appr-table tbody tr:last-child td{border-bottom:none}
.appr-table tbody tr:hover td{background:#f9fafb}
.appr-table tbody tr{cursor:pointer;transition:background .1s}
/* Status badges */
.st-대기{display:inline-block;background:#fef9c3;color:#854d0e;border-radius:20px;padding:3px 10px;font-size:.7rem;font-weight:600}
.st-승인{display:inline-block;background:#dcfce7;color:#166534;border-radius:20px;padding:3px 10px;font-size:.7rem;font-weight:600}
.st-반려{display:inline-block;background:#fee2e2;color:#991b1b;border-radius:20px;padding:3px 10px;font-size:.7rem;font-weight:600}
.st-대기잠김{display:inline-block;background:#f3f4f6;color:#6b7280;border-radius:20px;padding:3px 10px;font-size:.7rem;font-weight:600}
/* Action buttons */
.action-cell{display:flex;gap:6px;justify-content:flex-end;white-space:nowrap}
.btn-approve{background:#16a34a;color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-approve:hover{background:#15803d}
.btn-reject{background:#dc2626;color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-reject:hover{background:#b91c1c}
.done-label{font-size:.72rem;color:#9ca3af;font-style:italic}
/* No. column */
.req-no{color:#0078d4;font-weight:700;font-size:.85rem}
/* Summary row */
.summary-row{font-size:.75rem;color:#6b7280;padding:7px 14px;background:#f9fafb;border-top:1px solid #f3f4f6;text-align:right}
/* All done */
.all-done{text-align:center;padding:72px 20px;background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.all-done .icon{font-size:3rem;margin-bottom:14px}
.all-done .msg{font-size:1rem;font-weight:700;color:#1a1a2e;margin-bottom:6px}
.all-done .sub{font-size:.82rem;color:#9ca3af}
/* Detail Modal */
#detail-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
#detail-modal.open{display:flex}
.modal-box{background:#fff;border-radius:14px;width:640px;max-width:100%;padding:28px 32px;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;font-size:1.3rem;cursor:pointer;color:#9ca3af;line-height:1}
.modal-close:hover{color:#374151}
.modal-sys-badge{display:inline-flex;align-items:center;gap:6px;margin-bottom:14px}
.modal-title{font-size:1.05rem;font-weight:700;color:#1a1a2e;margin-bottom:18px;padding-bottom:14px;border-bottom:1.5px solid #f3f4f6}
.modal-sec{margin:16px 0 10px;font-size:.72rem;font-weight:700;color:#0078d4;text-transform:uppercase;letter-spacing:.5px;padding:5px 10px;background:#eff6ff;border-left:3px solid #0078d4;border-radius:4px}
.modal-row{display:flex;padding:7px 0;border-bottom:1px solid #f9fafb;font-size:.82rem}
.modal-row:last-child{border-bottom:none}
.modal-label{color:#6b7280;width:140px;flex-shrink:0;font-size:.75rem;font-weight:500}
.modal-val{color:#1a1a2e;font-weight:500;flex:1;line-height:1.5}
/* Approval history */
.appr-history{background:#f9fafb;border-radius:8px;border:1.5px solid #f3f4f6;overflow:hidden;margin-top:4px}
.appr-item{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 14px;border-bottom:1px solid #f3f4f6}
.appr-item:last-child{border-bottom:none}
.appr-order{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:#0078d4;color:#fff;border-radius:50%;font-size:.65rem;font-weight:700;flex-shrink:0;margin-right:8px;margin-top:1px}
.appr-info{flex:1}
.appr-role{font-size:.78rem;font-weight:700;color:#1a1a2e}
.appr-person{font-size:.72rem;color:#6b7280;margin-top:2px}
.appr-date{font-size:.7rem;color:#9ca3af;margin-top:2px}
.appr-comment{margin-top:5px;font-size:.72rem;background:#fff;border:1px solid #e5e7eb;border-radius:5px;padding:4px 8px;color:#4b5563}
.modal-action{display:flex;gap:10px;margin-top:20px}
.modal-action .btn-approve,.modal-action .btn-reject{flex:1;padding:11px;font-size:.9rem;border-radius:8px}
/* Confirm */
#confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;align-items:center;justify-content:center}
#confirm-modal.open{display:flex}
.confirm-box{background:#fff;border-radius:14px;padding:28px 28px 22px;max-width:440px;width:92%;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.confirm-title{font-size:1rem;font-weight:700;color:#1a1a2e;margin-bottom:6px}
.confirm-sub{font-size:.8rem;color:#6b7280;margin-bottom:14px}
.confirm-comment{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:9px 12px;font-size:.82rem;font-family:inherit;resize:vertical;margin-bottom:16px;transition:border .15s}
.confirm-comment:focus{outline:none;border-color:#0078d4}
.confirm-btns{display:flex;justify-content:flex-end;gap:8px}
.btn-cancel{background:#fff;border:1.5px solid #e5e7eb;border-radius:8px;padding:8px 20px;font-size:.85rem;cursor:pointer;font-family:inherit;color:#374151}
.btn-cancel:hover{border-color:#9ca3af}
/* Pagination */
.pg-wrap{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:#f9fafb;border-top:1px solid #f3f4f6}
.pg-info{font-size:.75rem;color:#6b7280}
.pg-btns{display:flex;gap:4px;align-items:center}
.pg-btn{border:1.5px solid #e5e7eb;background:#fff;border-radius:6px;padding:4px 10px;font-size:.78rem;cursor:pointer;color:#374151;font-family:inherit;transition:all .15s;min-width:32px;text-align:center}
.pg-btn:hover:not(:disabled){border-color:#0078d4;color:#0078d4}
.pg-btn.active{background:#0078d4;border-color:#0078d4;color:#fff;font-weight:700}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-ellipsis{font-size:.82rem;color:#9ca3af;padding:0 4px}
/* Loading */
#loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.7);align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(2px)}
#loading.show{display:flex}
.loading-box{background:#fff;border-radius:12px;padding:28px 40px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 4px 24px rgba(0,0,0,.12)}
.spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top:3px solid #0078d4;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.85rem;color:#4b5563;font-weight:500}
@media(max-width:1100px){#content{grid-template-columns:1fr}}
@media(max-width:600px){#content{grid-template-columns:1fr}.sys-card-header{flex-wrap:wrap;gap:6px}}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">📬</div>
    <div class="login-title">STK 통합 결재함</div>
    <div class="login-sub">STK Korea 결재 시스템 전체 대기 항목</div>
    <button class="btn-login" id="btn-login" disabled>로딩 중...</button>
    <div id="login-err"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-brand">
      <span class="header-icon">📬</span>
      <div>
        <div class="header-title">STK 통합 결재함</div>
        <div class="header-sub">STK Korea 결재 시스템 전체 대기 항목</div>
      </div>
    </div>
    <div class="user-row">
      <span class="user-name" id="user-name"></span>
      <button id="btn-logout" onclick="signOut()">로그아웃</button>
    </div>
  </div>

  <div class="filter-bar">
    <select id="filter-sys" onchange="resetPages();renderAll()">
      <option value="">전체 시스템</option>
      <option value="IT">IT Ticket</option>
      <option value="SCC">STK Contract</option>
      <option value="GW">Goodwill</option>
      <option value="BP">BP Master</option>
      <option value="FA">FA Registration</option>
      <option value="MC">Mobility Car</option>
      <option value="RR">Repair Report</option>
    </select>
    <select id="filter-status" onchange="resetPages();renderAll()">
      <option value="대기">대기 중</option>
      <option value="">전체</option>
      <option value="승인">승인</option>
      <option value="반려">반려</option>
    </select>
    <span class="summary-badge" id="summary-count">0건</span>
    <button class="btn-refresh" onclick="loadAll()">🔄 새로고침</button>
  </div>

  <div id="content"></div>
</div>

<!-- Detail Modal -->
<div id="detail-modal" onclick="if(event.target===this)closeDetail()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeDetail()">×</button>
    <div id="detail-sys-badge" class="modal-sys-badge"></div>
    <div class="modal-title" id="detail-title"></div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- Confirm Modal -->
<div id="confirm-modal" onclick="if(event.target===this)closeConfirm()">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title"></div>
    <div class="confirm-sub" id="confirm-sub"></div>
    <textarea class="confirm-comment" id="confirm-comment" rows="3"></textarea>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">취소</button>
      <button id="confirm-ok-btn" style="border:none;border-radius:8px;padding:8px 22px;font-size:.85rem;cursor:pointer;font-weight:600;font-family:inherit"></button>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="loading-box">
    <div class="spinner"></div>
    <span class="loading-text" id="loading-text">처리 중...</span>
  </div>
</div>

<script>
const CLIENT_ID='432976c2-b43a-492e-8213-ece505fa1f51';
const TENANT_ID='19cab1f5-21f4-44df-8ac6-96d6ca595203';
const SITE_PATH='startruckkorea.sharepoint.com:/sites/STK-DB:';
const GRAPH='https://graph.microsoft.com/v1.0';
const SCOPES=['User.Read','Sites.ReadWrite.All','Files.ReadWrite.All'];

const SYSTEMS=[
  {key:'IT', name:'IT Ticket',       apr:'IT_Approvals',          req:'IT_Requests',    url:'https://itsm-ticket.startruckkorea.com/'},
  {key:'SCC',name:'STK Contract',    apr:'STK_ContractApprovals', req:'STK_Contracts',  url:'https://scc.startruckkorea.com/'},
  {key:'GW', name:'Goodwill',        apr:'GW_Approvals',          req:'GW_Requests',    url:'https://gw.startruckkorea.com/'},
  {key:'BP', name:'BP Master Data',  apr:'BP_Approvals',          req:'BP_Requests',    url:'https://bp-master.startruckkorea.com/'},
  {key:'FA', name:'FA Registration', apr:'FA_Approvals',          req:'FA_Requests',    url:'https://fa.startruckkorea.com/'},
  {key:'MC', name:'Mobility Car',    apr:'MC_Approvals',          req:'MC_Requests',    url:'https://mc.startruckkorea.com/'},
  {key:'RR', name:'Repair Report',   apr:'RR_Approvals',          req:'RR_Requests',    url:'https://mc.startruckkorea.com/'},
];

let msalApp=null,user=null,siteId=null,_allData={},_pending=null;
const PAGE_SIZE=20;
let _pages={}; // sysKey -> current page (0-based)

window.addEventListener('load',async()=>{
  const btn=document.getElementById('btn-login');
  try{
    const inst=await msal.PublicClientApplication.createPublicClientApplication({
      auth:{clientId:CLIENT_ID,authority:'https://login.microsoftonline.com/'+TENANT_ID,redirectUri:window.location.origin+window.location.pathname},
      cache:{cacheLocation:'localStorage'}
    });
    msalApp=inst;
    const resp=await msalApp.handleRedirectPromise();
    if(resp){msalApp.setActiveAccount(resp.account);await boot(resp.account);return;}
    const accounts=msalApp.getAllAccounts();
    if(accounts.length){msalApp.setActiveAccount(accounts[0]);await boot(accounts[0]);return;}
    btn.disabled=false;btn.textContent='Microsoft 계정으로 로그인';
  }catch(e){btn.disabled=false;btn.textContent='Microsoft 계정으로 로그인';document.getElementById('login-err').textContent='오류: '+e.message;document.getElementById('login-err').style.display='block';}
});
async function signIn(){
  try{if(window!==window.top){window.open(window.location.href,'_blank');return;}const r=await msalApp.loginPopup({scopes:SCOPES});msalApp.setActiveAccount(r.account);await boot(r.account);}
  catch(e){document.getElementById('login-err').textContent=e.message;document.getElementById('login-err').style.display='block';}
}
document.getElementById('btn-login').onclick=signIn;
function signOut(){msalApp.logoutRedirect();}

async function token(){
  try{return(await msalApp.acquireTokenSilent({scopes:SCOPES,account:msalApp.getActiveAccount()})).accessToken;}
  catch(e){if(e.name==='InteractionRequiredAuthError'||(e.errorCode&&e.errorCode.includes('interaction_required'))){const r=await msalApp.acquireTokenPopup({scopes:SCOPES});msalApp.setActiveAccount(r.account);return r.accessToken;}throw e;}
}
async function api(path,method='GET',body=null){
  const t=await token();
  const opts={method,headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(GRAPH+path,opts);
  if(!res.ok)throw new Error((await res.json())?.error?.message||res.status);
  return res.status===204?null:res.json();
}
function loading(on,txt='처리 중...'){
  document.getElementById('loading').className=on?'show':'';
  document.getElementById('loading-text').textContent=txt;
}
function fmt(s){if(!s)return'-';const d=new Date(s);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

async function boot(account){
  user=account;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  try{const me=await api('/me?$select=mail,userPrincipalName');user.email=(me.mail||me.userPrincipalName||account.username||'').toLowerCase();}
  catch(e){user.email=(account.username||'').toLowerCase();}
  document.getElementById('user-name').textContent=account.name||account.username;
  loading(true,'데이터 불러오는 중...');
  const site=await api('/sites/'+SITE_PATH);
  siteId=site.id;
  loading(false);
  await loadAll();
}

async function loadAll(){
  loading(true,'전체 결재 데이터 불러오는 중...');
  _allData={};
  await Promise.all(SYSTEMS.map(async sys=>{
    try{
      const [apprData,reqData]=await Promise.all([
        api('/sites/'+siteId+'/lists/'+sys.apr+'/items?$expand=fields&$top=500'),
        api('/sites/'+siteId+'/lists/'+sys.req+'/items?$expand=fields&$top=500'),
      ]);
      const reqMap={};reqData.value.forEach(r=>{reqMap[r.id]=r.fields;});
      _allData[sys.key]={apprItems:apprData.value,reqMap};
    }catch(e){_allData[sys.key]={apprItems:[],reqMap:{},error:e.message};}
  }));
  loading(false);
  renderAll();
}

function summary(sysKey,rf){
  if(sysKey==='GW')  return(rf.Source||'')+' / '+(rf.GoodwillType||'');
  if(sysKey==='BP')  return(rf.BPType||'')+' / '+(rf.SubCategory||'');
  if(sysKey==='FA')  return(rf.FAType||'')+' / '+(rf.Title||'').substring(0,30);
  if(sysKey==='SCC') return(rf.ContractCompanyType||'')+' / '+(rf.Title||'').substring(0,30);
  if(sysKey==='IT')  return(rf.TicketType||'')+' / '+(rf.Title||'').substring(0,30);
  if(sysKey==='MC')  return(rf.Department||'')+' / '+(rf.Period||'').substring(0,24);
  if(sysKey==='RR')  return(rf.VehicleModel||'')+' / '+(rf.AccidentType||'');
  return'-';
}

function stBadge(st){
  const map={'대기':'st-대기','승인':'st-승인','반려':'st-반려','대기(잠김)':'st-대기잠김','승인완료':'st-승인'};
  return`<span class="${map[st]||'st-대기잠김'}">${st||'대기'}</span>`;
}

function resetPages(){_pages={};}
function goPage(sysKey,p){_pages[sysKey]=p;renderAll();}

function renderAll(){
  const fSys=document.getElementById('filter-sys').value;
  const fSt=document.getElementById('filter-status').value;
  const myEmail=(user.email||'').toLowerCase();
  let html='',total=0;

  for(const sys of SYSTEMS){
    if(fSys&&fSys!==sys.key)continue;
    const d=_allData[sys.key];
    if(!d){html+=card(sys,'<div class="sys-empty">불러오는 중...</div>',0);continue;}
    if(d.error){html+=card(sys,`<div class="sys-empty" style="color:#dc2626">⚠️ ${d.error}</div>`,0);continue;}

    let mine=d.apprItems.filter(i=>(i.fields.ApproverEmail||'').toLowerCase()===myEmail);
    if(fSt)mine=mine.filter(i=>(i.fields.Status||'').trim()===fSt);
    mine=mine.sort((a,b)=>{
      const ra=d.reqMap[String(a.fields.RequestID)],rb=d.reqMap[String(b.fields.RequestID)];
      return new Date(rb?.RequestDate||0)-new Date(ra?.RequestDate||0);
    });
    total+=mine.length;

    if(!mine.length){html+=card(sys,`<div class="sys-empty">${fSt==='대기'?'결재 대기 항목이 없습니다 ✓':'항목이 없습니다'}</div>`,0);continue;}

    // 페이지네이션
    const totalItems=mine.length;
    const totalPages=Math.max(1,Math.ceil(totalItems/PAGE_SIZE));
    const curPage=Math.min(_pages[sys.key]||0, totalPages-1);
    _pages[sys.key]=curPage;
    const pageItems=mine.slice(curPage*PAGE_SIZE,(curPage+1)*PAGE_SIZE);

    let rows='';
    pageItems.forEach(item=>{
      const f=item.fields,rf=d.reqMap[String(f.RequestID)]||{};
      const isPending=(f.Status||'').trim()==='대기';
      rows+=`<tr onclick="showDetail('${sys.key}',${f.RequestID})">
        <td style="width:44px"><span class="req-no">#${f.RequestID}</span></td>
        <td style="width:140px;font-size:.72rem;color:#6b7280;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${rf.RequesterEmail||'-'}</td>
        <td style="font-size:.78rem">${summary(sys.key,rf)||'-'}</td>
        <td style="width:60px">${stBadge(f.Status)}</td>
        <td style="width:100px;font-size:.72rem;color:#6b7280">${fmt(rf.RequestDate)}</td>
        <td style="width:110px" onclick="event.stopPropagation()">
          <div class="action-cell">
            ${isPending
              ?`<button class="btn-approve" onclick="showConfirm(${item.id},'승인',${f.RequestID},'${sys.key}')">승인</button><button class="btn-reject" onclick="showConfirm(${item.id},'반려',${f.RequestID},'${sys.key}')">반려</button>`
              :`<span class="done-label">처리완료</span>`}
          </div>
        </td>
      </tr>`;
    });

    // 페이지네이션 버튼 생성
    let pgHtml='';
    if(totalPages>1){
      const start=curPage*PAGE_SIZE+1, end=Math.min((curPage+1)*PAGE_SIZE,totalItems);
      let btns=`<button class="pg-btn" onclick="goPage('${sys.key}',${curPage-1})" ${curPage===0?'disabled':''}>‹</button>`;
      for(let p=0;p<totalPages;p++){
        if(totalPages>7&&p>0&&p<totalPages-1&&Math.abs(p-curPage)>2){
          if(p===curPage-3||p===curPage+3)btns+=`<span class="pg-ellipsis">…</span>`;
          continue;
        }
        btns+=`<button class="pg-btn${p===curPage?' active':''}" onclick="goPage('${sys.key}',${p})">${p+1}</button>`;
      }
      btns+=`<button class="pg-btn" onclick="goPage('${sys.key}',${curPage+1})" ${curPage===totalPages-1?'disabled':''}>›</button>`;
      pgHtml=`<div class="pg-wrap"><span class="pg-info">${start}–${end} / 전체 ${totalItems}건</span><div class="pg-btns">${btns}</div></div>`;
    }

    html+=card(sys,
      `<table class="appr-table">
        <thead><tr>
          <th style="width:44px">번호</th>
          <th style="width:140px">신청자</th>
          <th>요약</th>
          <th style="width:60px">상태</th>
          <th style="width:100px">신청일</th>
          <th style="width:110px;text-align:right">처리</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${pgHtml||`<div class="summary-row">전체 ${totalItems}건</div>`}`,
      mine.length);
  }

  document.getElementById('summary-count').textContent='총 '+total+'건';
  document.getElementById('content').innerHTML=total===0&&fSt==='대기'
    ?`<div class="all-done"><div class="icon">✅</div><div class="msg">모든 결재 완료!</div><div class="sub">현재 대기 중인 결재 항목이 없습니다.</div></div>`
    :html||'<div class="all-done"><div class="icon">📭</div><div class="msg">항목 없음</div><div class="sub">필터 조건에 해당하는 항목이 없습니다.</div></div>';
}

function card(sys,inner,cnt){
  return`<div class="sys-card">
    <div class="sys-card-header">
      <div class="sys-card-left">
        <span class="sys-badge sys-${sys.key}">${sys.key}</span>
        <span class="sys-name">${sys.name}</span>
        ${cnt>0?`<span class="sys-cnt">${cnt}</span>`:''}
      </div>
      <a href="${sys.url}" target="_blank" class="sys-link">바로가기 →</a>
    </div>
    ${inner}
  </div>`;
}

async function showDetail(sysKey,reqId){
  const modal=document.getElementById('detail-modal');
  document.getElementById('detail-content').innerHTML='<div style="text-align:center;padding:32px;color:#6b7280"><div class="spinner" style="margin:0 auto 12px"></div>불러오는 중...</div>';
  document.getElementById('detail-sys-badge').innerHTML=`<span class="sys-badge sys-${sysKey}">${sysKey}</span>`;
  document.getElementById('detail-title').textContent='신청 #'+reqId+' 상세보기';
  modal.className='open';
  const sys=SYSTEMS.find(s=>s.key===sysKey);
  try{
    const [r,apprData]=await Promise.all([
      api('/sites/'+siteId+'/lists/'+sys.req+'/items/'+reqId+'?$expand=fields'),
      api('/sites/'+siteId+'/lists/'+sys.apr+'/items?$expand=fields&$top=500'),
    ]);
    const f=r.fields;
    const apprList=apprData.value.filter(i=>Number(i.fields.RequestID)===Number(reqId)).sort((a,b)=>a.fields.ApprovalOrder-b.fields.ApprovalOrder);
    const sc={'대기':'#b45309','승인':'#15803d','반려':'#b91c1c','대기(잠김)':'#6b7280','승인완료':'#15803d'};
    const sec=t=>`<div class="modal-sec">${t}</div>`;
    const row=(l,v)=>`<div class="modal-row"><div class="modal-label">${l}</div><div class="modal-val">${v||'-'}</div></div>`;

    let info=sec('기본 정보')+row('신청번호','#'+reqId)+row('신청자',f.RequesterEmail)+
      row('상태',stBadge(f.Status))+row('신청일',fmt(f.RequestDate));
    if(sysKey==='GW')       info+=sec('신청 정보')+row('Source',f.Source)+row('Amount',f.Amount)+row('Type',f.GoodwillType)+row('Title',f.Title)+row('Description','<div style="white-space:pre-wrap">'+(f.Description||'-')+'</div>');
    else if(sysKey==='BP')  info+=sec('신청 정보')+row('BP Type',f.BPType)+row('Sub Category',f.SubCategory)+row('BP Name',f.BPName);
    else if(sysKey==='FA')  info+=sec('신청 정보')+row('FA Type',f.FAType)+row('Title',f.Title);
    else if(sysKey==='SCC') info+=sec('신청 정보')+row('Type',f.ContractCompanyType)+row('Title',f.Title)+row('Partner',f.ContractPartner);
    else if(sysKey==='IT')  info+=sec('신청 정보')+row('Type',f.TicketType)+row('Title',f.Title)+row('Description','<div style="white-space:pre-wrap">'+(f.Description||'-')+'</div>');
    else if(sysKey==='MC')  info+=sec('신청 정보')+row('Company',f.Company)+row('Department',f.Department)+row('Car Model',f.CarModel)+row('Period',f.Period)+row('Driver',f.DriverName);
    else if(sysKey==='RR')  info+=sec('신청 정보')+row('Vehicle Model',f.VehicleModel)+row('Plate No.',f.PlateNumber)+row('Accident Type',f.AccidentType)+row('Date/Time',f.AccidentDateTime)+row('Location',f.Location)+row('Description','<div style="white-space:pre-wrap">'+(f.Description||'-')+'</div>');

    const apprHtml=sec('결재 이력')+'<div class="appr-history">'+
      apprList.map(a=>{const af=a.fields;return`<div class="appr-item">
        <div style="display:flex;align-items:flex-start;flex:1">
          <span class="appr-order">${af.ApprovalOrder}</span>
          <div class="appr-info">
            <div class="appr-role">${af.ApproverRole||''}</div>
            <div class="appr-person">${af.ApproverName||''} · ${af.ApproverEmail||''}</div>
            ${af.ApprovalDate?`<div class="appr-date">${fmt(af.ApprovalDate)}</div>`:''}
            ${af.Comment?`<div class="appr-comment">💬 ${af.Comment}</div>`:''}
          </div>
        </div>
        <span style="color:${sc[af.Status]||'#374151'};font-weight:700;font-size:.78rem;white-space:nowrap;padding-left:8px">${af.Status||''}</span>
      </div>`;}).join('')+'</div>';

    const myPending=apprList.find(a=>(a.fields.ApproverEmail||'').toLowerCase()===(user.email||'').toLowerCase()&&(a.fields.Status||'').trim()==='대기');
    document.getElementById('detail-content').innerHTML=info+apprHtml+
      (myPending?`<div class="modal-action">
        <button onclick="showConfirm(${myPending.id},'승인',${reqId},'${sysKey}')" class="btn-approve">✅ 승인</button>
        <button onclick="showConfirm(${myPending.id},'반려',${reqId},'${sysKey}')" class="btn-reject">❌ 반려</button>
      </div>`:'');
  }catch(e){document.getElementById('detail-content').innerHTML=`<p style="color:#dc2626;padding:16px">오류: ${e.message}</p>`;}
}
function closeDetail(){document.getElementById('detail-modal').className='';}

function showConfirm(apprId,action,reqId,sysKey){
  _pending={apprId,action,reqId,sysKey};
  const isReject=action==='반려';
  document.getElementById('confirm-title').textContent=isReject?'❌ 반려 확인':'✅ 승인 확인';
  document.getElementById('confirm-sub').textContent=isReject?'반려 사유를 입력해주세요. (필수)':'이 신청을 승인하시겠습니까?';
  const commentEl=document.getElementById('confirm-comment');
  commentEl.value='';commentEl.placeholder=isReject?'반려 사유 입력 (필수)':'의견 입력 (선택사항)';
  const okBtn=document.getElementById('confirm-ok-btn');
  okBtn.textContent=isReject?'반려 처리':'승인 처리';
  okBtn.style.background=isReject?'#dc2626':'#16a34a';
  okBtn.style.color='#fff';okBtn.onclick=doApproval;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('open');_pending=null;}

async function doApproval(){
  if(!_pending)return;
  const{apprId,action,reqId,sysKey}=_pending;
  const comment=document.getElementById('confirm-comment').value.trim();
  if(action==='반려'&&!comment){alert('반려 사유를 입력해주세요.');return;}
  closeConfirm();
  const sys=SYSTEMS.find(s=>s.key===sysKey);
  loading(true,action==='승인'?'승인 처리 중...':'반려 처리 중...');
  try{
    await api('/sites/'+siteId+'/lists/'+sys.apr+'/items/'+apprId,'PATCH',{fields:{Status:action==='승인'?'승인':action,ApprovalDate:new Date().toISOString(),Comment:comment}});
    if(action==='반려'){
      await api('/sites/'+siteId+'/lists/'+sys.req+'/items/'+reqId,'PATCH',{fields:{Status:'반려'}});
    }else{
      const all=await api('/sites/'+siteId+'/lists/'+sys.apr+'/items?$expand=fields&$top=500');
      const next=all.value.filter(i=>Number(i.fields.RequestID)===Number(reqId)&&(i.fields.Status||'').trim()==='대기(잠김)').sort((a,b)=>a.fields.ApprovalOrder-b.fields.ApprovalOrder);
      if(next.length)await api('/sites/'+siteId+'/lists/'+sys.apr+'/items/'+next[0].id,'PATCH',{fields:{Status:'대기'}});
      else await api('/sites/'+siteId+'/lists/'+sys.req+'/items/'+reqId,'PATCH',{fields:{Status:'승인완료'}});
    }
    closeDetail();
    await loadAll();
  }catch(e){alert('오류: '+e.message);}
  finally{loading(false);}
}
</script>
